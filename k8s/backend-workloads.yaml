apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: shewongunarathne/auth-service:v1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 3009
          envFrom:
            - secretRef:
                name: auth-service-env
          env:
            - name: PORT
              value: "3009"
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: healthcare
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3009
      targetPort: 3009
  type: ClusterIP
---
